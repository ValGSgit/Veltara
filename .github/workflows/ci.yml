name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared (required by all packages)
        run: pnpm --filter @veltara/shared build

      - name: Typecheck
        run: pnpm --recursive --if-present typecheck

      - name: Lint
        run: pnpm --recursive --if-present lint

      - name: Test
        run: pnpm --recursive --if-present test

      - name: Build SDK
        run: pnpm --filter @veltara/sdk build

      - name: Build web
        run: pnpm --filter @veltara/web build

      - name: Build portal
        run: pnpm --filter @veltara/portal build
