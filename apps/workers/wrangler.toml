name = "veltara-workers"
main = "src/planet-api.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─── Durable Objects ─────────────────────────────────────────
[[durable_objects.bindings]]
name = "REGION_ROOM"
class_name = "RegionRoom"
script_name = "veltara-workers"

[[migrations]]
tag = "v1"
new_classes = ["RegionRoom"]

# ─── KV Namespaces ────────────────────────────────────────────
[[kv_namespaces]]
binding = "KV_SESSIONS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_ID"

[[kv_namespaces]]
binding = "KV_WORLD"
id = "REPLACE_WITH_KV_WORLD_ID"
preview_id = "REPLACE_WITH_KV_WORLD_PREVIEW_ID"

[[kv_namespaces]]
binding = "KV_API_KEYS"
id = "REPLACE_WITH_KV_API_KEYS_ID"
preview_id = "REPLACE_WITH_KV_API_KEYS_PREVIEW_ID"

[[kv_namespaces]]
binding = "KV_MODERATION"
id = "REPLACE_WITH_KV_MODERATION_ID"
preview_id = "REPLACE_WITH_KV_MODERATION_PREVIEW_ID"

# ─── R2 Buckets ───────────────────────────────────────────────
[[r2_buckets]]
binding = "R2_ASSETS"
bucket_name = "veltara-assets"
preview_bucket_name = "veltara-assets-dev"

# ─── AI ───────────────────────────────────────────────────────
[ai]
binding = "AI"

# ─── Cron Triggers ────────────────────────────────────────────
[triggers]
crons = ["*/1 * * * *", "0 */2 * * *"]

# ─── Routes ───────────────────────────────────────────────────
[[routes]]
pattern = "veltara.gg/api/*"
zone_name = "veltara.gg"

[[routes]]
pattern = "veltara.gg/v1/*"
zone_name = "veltara.gg"

# ─── Environments ─────────────────────────────────────────────

[env.staging]
name = "veltara-workers-staging"
[[env.staging.kv_namespaces]]
binding = "KV_SESSIONS"
id = "STAGING_KV_SESSIONS_ID"

[[env.staging.kv_namespaces]]
binding = "KV_WORLD"
id = "STAGING_KV_WORLD_ID"

[[env.staging.kv_namespaces]]
binding = "KV_API_KEYS"
id = "STAGING_KV_API_KEYS_ID"

[[env.staging.kv_namespaces]]
binding = "KV_MODERATION"
id = "STAGING_KV_MODERATION_ID"

[[env.staging.r2_buckets]]
binding = "R2_ASSETS"
bucket_name = "veltara-assets-staging"

[env.production]
name = "veltara-workers-prod"
[[env.production.kv_namespaces]]
binding = "KV_SESSIONS"
id = "PROD_KV_SESSIONS_ID"

[[env.production.kv_namespaces]]
binding = "KV_WORLD"
id = "PROD_KV_WORLD_ID"

[[env.production.kv_namespaces]]
binding = "KV_API_KEYS"
id = "PROD_KV_API_KEYS_ID"

[[env.production.kv_namespaces]]
binding = "KV_MODERATION"
id = "PROD_KV_MODERATION_ID"

[[env.production.r2_buckets]]
binding = "R2_ASSETS"
bucket_name = "veltara-assets-prod"

[[env.production.routes]]
pattern = "veltara.gg/api/*"
zone_name = "veltara.gg"

[[env.production.routes]]
pattern = "veltara.gg/v1/*"
zone_name = "veltara.gg"
