<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Veltara — explore a living planet with thousands of players" />
    <title>Veltara</title>
    <link rel="icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      /* Prevent FOUC */
      body { background: #0a0a12; color: #e2e2f0; }
    </style>
  </head>
  <body>
    <canvas id="planet-canvas" aria-label="Interactive 3D planet view"></canvas>
    <div id="hud" role="main" aria-label="Game HUD"></div>
    <div id="modals" role="dialog" aria-live="polite"></div>
    <div id="toasts" role="alert" aria-live="assertive" aria-atomic="true"></div>
    <script type="module" src="/src/main.js"></script>

</html>
