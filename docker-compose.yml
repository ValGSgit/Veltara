services:
  deps:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: veltara-deps
    working_dir: /workspace
    env_file:
      - .env
    environment:
      CI: "1"
    command:
      - /bin/sh
      - -lc
      - sh ./scripts/setup-local-certs-container.sh && pnpm install --no-frozen-lockfile && pnpm --filter @veltara/shared build && pnpm --filter @veltara/sdk build
    volumes:
      - ./:/workspace
      - veltara_node_modules:/workspace/node_modules
      - veltara_web_node_modules:/workspace/apps/web/node_modules
      - veltara_portal_node_modules:/workspace/apps/portal/node_modules
      - veltara_workers_node_modules:/workspace/apps/workers/node_modules
      - veltara_sdk_node_modules:/workspace/apps/sdk/node_modules
      - veltara_shared_node_modules:/workspace/packages/shared/node_modules
      - veltara_pnpm_store:/pnpm/store

  workers:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: veltara-workers
    working_dir: /workspace
    env_file:
      - .env
    environment:
      NODE_ENV: development
      CI: "1"
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-${CF_API_TOKEN:-}}
    command: >
      pnpm --filter @veltara/workers exec wrangler dev --local --ip 0.0.0.0 --port 8787 --local-protocol https
    ports:
      - "8787:8787"
    depends_on:
      deps:
        condition: service_completed_successfully
    volumes:
      - ./:/workspace
      - veltara_node_modules:/workspace/node_modules
      - veltara_workers_node_modules:/workspace/apps/workers/node_modules
      - veltara_shared_node_modules:/workspace/packages/shared/node_modules
      - veltara_pnpm_store:/pnpm/store

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: veltara-web
    working_dir: /workspace
    env_file:
      - .env
    environment:
      NODE_ENV: development
      WORKERS_PROXY_TARGET: https://workers:8787
      DEV_HTTPS: "true"
      CI: "1"
    command: >
      pnpm --filter @veltara/web exec vite --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    depends_on:
      deps:
        condition: service_completed_successfully
      workers:
        condition: service_started
    volumes:
      - ./:/workspace
      - veltara_node_modules:/workspace/node_modules
      - veltara_web_node_modules:/workspace/apps/web/node_modules
      - veltara_shared_node_modules:/workspace/packages/shared/node_modules
      - veltara_pnpm_store:/pnpm/store

  portal:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: veltara-portal
    working_dir: /workspace
    env_file:
      - .env
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: https://localhost:8787
      DEV_HTTPS: "true"
      CI: "1"
    command: >
      pnpm --filter @veltara/portal exec vite --host 0.0.0.0 --port 5174
    ports:
      - "5174:5174"
    depends_on:
      deps:
        condition: service_completed_successfully
      workers:
        condition: service_started
    volumes:
      - ./:/workspace
      - veltara_node_modules:/workspace/node_modules
      - veltara_portal_node_modules:/workspace/apps/portal/node_modules
      - veltara_sdk_node_modules:/workspace/apps/sdk/node_modules
      - veltara_shared_node_modules:/workspace/packages/shared/node_modules
      - veltara_pnpm_store:/pnpm/store

volumes:
  veltara_node_modules:
  veltara_web_node_modules:
  veltara_portal_node_modules:
  veltara_workers_node_modules:
  veltara_sdk_node_modules:
  veltara_shared_node_modules:
  veltara_pnpm_store:
